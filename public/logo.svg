<svg width="480" height="80" viewBox="0 0 480 80" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="fillGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4F46E5" />
      <stop offset="100%" stop-color="#7C3AED" />
    </linearGradient>
    <style>
      .textLearn {
        font-family: 'Outfit', 'Inter', system-ui, -apple-system, sans-serif;
        font-weight: 800;
        font-size: 62px;
        fill: #4F46E5;
        letter-spacing: -2px;
      }
      .textAmp {
        font-family: 'Outfit', 'Inter', system-ui, -apple-system, sans-serif;
        font-weight: 300;
        font-size: 62px;
        fill: #0F172A;
        letter-spacing: -2px;
      }
      .textFill {
        font-family: 'Outfit', 'Inter', system-ui, -apple-system, sans-serif;
        font-weight: 800;
        font-size: 62px;
        fill: url(#fillGradient);
        letter-spacing: -2px;
      }
    </style>
  </defs>
  <text x="0" y="60" class="textLearn">Learn <tspan class="textAmp">&amp; </tspan><tspan class="textFill">Fill</tspan></text>
</svg>
